name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable-host
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run workspace tests
        run: cargo test --workspace

  test-packaged:
    name: Test packaged crates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-packaged
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Package ekf2-sys
        run: cargo package -p ekf2-sys --no-verify --locked

      - name: Test packaged ekf2-sys
        run: |
          set -euo pipefail
          BUILD=$(mktemp -d)
          tar xf target/package/ekf2-sys-*.crate -C "$BUILD"
          CANONICAL="$BUILD/$(ls "$BUILD")"

          # Run A: tests from the extracted tarball
          cargo test --manifest-path "$CANONICAL/Cargo.toml"

          # Swap in git source files, keeping the extracted Cargo.toml and
          # Cargo.lock so the dependency set is identical.
          rm -rf "$CANONICAL/src" "$CANONICAL/wrapper" "$CANONICAL/vendor" \
                 "$CANONICAL/build.rs" "$CANONICAL/tests"
          cp -r ekf2-sys/src      "$CANONICAL/src"
          cp -r ekf2-sys/wrapper  "$CANONICAL/wrapper"
          cp -r ekf2-sys/vendor   "$CANONICAL/vendor"
          cp    ekf2-sys/build.rs "$CANONICAL/build.rs"
          cp -r ekf2-sys/tests    "$CANONICAL/tests"

          # Run B: same tests from git source — both must pass
          cargo clean --manifest-path "$CANONICAL/Cargo.toml"
          cargo test --manifest-path "$CANONICAL/Cargo.toml"

  build-targets:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabihf
          - thumbv6m-none-eabi
          - x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install ARM cross compiler
        if: startsWith(matrix.target, 'thumb')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build workspace libraries for target
        run: cargo build --workspace --lib --target ${{ matrix.target }}
